<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="nGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#2979ff"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2979ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit dots and lines -->
  <circle cx="22" cy="42" r="3" fill="#00e5ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="10" cy="58" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="18" cy="72" r="2" fill="#00e5ff" opacity="0.4"/>
  <line x1="22" y1="42" x2="10" y2="58" stroke="#00e5ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="10" y1="58" x2="18" y2="72" stroke="#00e5ff" stroke-width="1.2" opacity="0.4"/>

  <circle cx="98" cy="28" r="3" fill="#00e5ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="110" cy="42" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <line x1="98" y1="28" x2="110" y2="42" stroke="#00e5ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="85" y1="22" x2="98" y2="28" stroke="#00e5ff" stroke-width="1.2" opacity="0.4"/>

  <!-- Main N letterform -->
  <path
    d="M20 88 L20 22 L36 22 L68 62 L68 22 L84 22 L84 88 L68 88 L36 48 L36 88 Z"
    fill="url(#nGrad)"
    filter="url(#glow)"
  />

  <!-- Arrow shape pointing right (incorporated with N) -->
  <path
    d="M82 52 L100 52 L100 44 L116 60 L100 76 L100 68 L82 68 Z"
    fill="url(#arrowGrad)"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Inner N shadow for depth -->
  <path
    d="M36 30 L62 62 L62 30 Z"
    fill="#0a1628"
    opacity="0.5"
  />
</svg>
